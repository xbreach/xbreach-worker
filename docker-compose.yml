services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: ${XBREACH_CLICKHOUSE_DB:-xbreach}
      CLICKHOUSE_USER: ${XBREACH_CLICKHOUSE_USER:-xbreach}
      CLICKHOUSE_PASSWORD: ${XBREACH_CLICKHOUSE_PASSWORD:-xbreach}
    volumes:
      - /data/xbreach/clickhouse:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - xbreach-internal

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      XBREACH_APP_ID: ${XBREACH_WORKER_APP_ID:-2}
      XBREACH_NODE_ID: ${XBREACH_WORKER_NODE_ID:-1}
      XBREACH_DATA_PATH: ${XBREACH_DATA_PATH:-/data/xbreach}
      XBREACH_LOG_LEVEL: ${XBREACH_LOG_LEVEL:-INFO}
      XBREACH_POSTGRES_HOST: ${XBREACH_POSTGRES_HOST:-postgres}
      XBREACH_POSTGRES_PORT: ${XBREACH_POSTGRES_PORT:-5432}
      XBREACH_POSTGRES_DB: ${XBREACH_POSTGRES_DB:-xbreach}
      XBREACH_POSTGRES_USER: ${XBREACH_POSTGRES_USER:-xbreach}
      XBREACH_POSTGRES_PASSWORD: ${XBREACH_POSTGRES_PASSWORD:-xbreach}
      XBREACH_CLICKHOUSE_HOST: ${XBREACH_CLICKHOUSE_HOST:-clickhouse}
      XBREACH_CLICKHOUSE_PORT: ${XBREACH_CLICKHOUSE_PORT:-9000}
      XBREACH_CLICKHOUSE_DB: ${XBREACH_CLICKHOUSE_DB:-xbreach}
      XBREACH_CLICKHOUSE_USER: ${XBREACH_CLICKHOUSE_USER:-xbreach}
      XBREACH_CLICKHOUSE_PASSWORD: ${XBREACH_CLICKHOUSE_PASSWORD:-xbreach}
      XBREACH_HMAC_EMAIL_KEY: ${XBREACH_HMAC_EMAIL_KEY:-change-me-hmac-key-min-32-bytes-long-please}
      XBREACH_CLICKHOUSE_BATCH_SIZE: ${XBREACH_CLICKHOUSE_BATCH_SIZE:-50000}
      XBREACH_STORE_PLAINTEXT_PASSWORD: ${XBREACH_STORE_PLAINTEXT_PASSWORD:-true}
      XBREACH_STORE_RAW_LINE: ${XBREACH_STORE_RAW_LINE:-false}
    volumes:
      - /data/xbreach:/data/xbreach
    networks:
      - xbreach-internal

# Postgres (and the raw files in /data/xbreach) are provided by the
# xbreach-ingest compose, which creates the shared `xbreach-internal` network.
# Start the ingest stack first, then `docker compose up --build` here.
networks:
  xbreach-internal:
    external: true
