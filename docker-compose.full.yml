# Full local stack for end-to-end testing: ingest API + Postgres + Redis +
# ClickHouse + worker, on one network sharing the raw-files volume.
#
#   docker compose -f docker-compose.full.yml up --build
#
# Then open http://localhost:8000 (login admin@xbreach.local / xbreach),
# create a source, upload a leak file, and watch the job reach "completed".
name: xbreach

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xbreach
      POSTGRES_USER: xbreach
      POSTGRES_PASSWORD: xbreach
    volumes:
      - xbreach-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xbreach -d xbreach"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [xbreach]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [xbreach]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: xbreach
      CLICKHOUSE_USER: xbreach
      CLICKHOUSE_PASSWORD: xbreach
    volumes:
      - xbreach-ch:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [xbreach]

  api:
    build:
      context: ../xbreach-ingest
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      XBREACH_POSTGRES_HOST: postgres
      XBREACH_REDIS_HOST: redis
      XBREACH_DATA_PATH: /data/xbreach
      XBREACH_UPLOAD_MAX_FILE_SIZE_BYTES: ${XBREACH_UPLOAD_MAX_FILE_SIZE_BYTES:-5368709120}
      XBREACH_LOGIN_EMAIL: admin@xbreach.local
      XBREACH_LOGIN_PASSWORD: xbreach
      XBREACH_SESSION_SECRET: change-me-in-production-with-32-bytes-minimum
    command: >
      sh -c "python -m app.infrastructure.migrations
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - xbreach-data:/data/xbreach
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [xbreach]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      XBREACH_APP_ID: 2
      XBREACH_NODE_ID: 1
      XBREACH_DATA_PATH: /data/xbreach
      XBREACH_POSTGRES_HOST: postgres
      XBREACH_CLICKHOUSE_HOST: clickhouse
      XBREACH_CLICKHOUSE_PORT: 9000
      XBREACH_WORKER_POLL_INTERVAL_SECONDS: 2
    volumes:
      - xbreach-data:/data/xbreach
    networks: [xbreach]

volumes:
  xbreach-pg:
  xbreach-ch:
  xbreach-data:

networks:
  xbreach:
